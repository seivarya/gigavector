name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libcurl4-openssl-dev

      - name: Build library with Make
        run: make lib

      - name: Run all C tests
        run: make c-test

      - name: Configure CMake build
        run: cmake -S . -B build-cmake -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF

      - name: Build with CMake
        run: cmake --build build-cmake --parallel

      - name: Run CMake tests
        run: ctest --test-dir build-cmake --output-on-failure --parallel

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: python -m pip install ./python

      - name: Run Python tests
        run: python -m unittest discover -s python/tests -v
