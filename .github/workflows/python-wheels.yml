name: Build Python wheels

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish wheels to PyPI after building"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  build-wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip cibuildwheel==2.*

      # Windows: ensure MinGW gcc (from the pre-installed MSYS2) is on PATH
      # so CMake picks it up instead of MSVC, and pthread/POSIX headers work.
      - name: Set up MinGW (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          C:/msys64/usr/bin/pacman -S --noconfirm --needed \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-make
          echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Build wheels
        env:
          # Build CPython wheels only (no PyPy).
          CIBW_SKIP: "pp*"
          # Only build 64-bit wheels across platforms.
          CIBW_ARCHS_LINUX:   "x86_64"
          CIBW_ARCHS_MACOS:   "arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"

          # Keep linux wheels portable (fixes WSL SIGILL from CET IBT/SHSTK).
          CIBW_ENVIRONMENT_LINUX: "HARDENING_FLAGS='-fcf-protection=none -mno-shstk'"

          # Windows: route the CMake build through MinGW Makefiles so POSIX
          # headers (pthread, unistd, …) are available via MSYS2 runtime.
          CIBW_ENVIRONMENT_WINDOWS: >-
            PATH="C:\\msys64\\mingw64\\bin;$PATH"
            CMAKE_GENERATOR="MinGW Makefiles"

          # manylinux images
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"

          # Fix wheel layout before auditwheel runs (auditwheel requires platlib).
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            python /project/python/tools/wheel_fixup_platlib.py {wheel} &&
            auditwheel repair -w {dest_dir} {wheel}

          CIBW_BUILD_VERBOSITY: "1"
        run: cibuildwheel --output-dir python/dist python

      - name: Build sdist (linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade build
          python -m build -s python -o python/dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: python/dist/*
          retention-days: 30

  publish:
    name: publish to PyPI
    if: github.event_name == 'release' || inputs.publish == 'true'
    runs-on: ubuntu-latest
    needs: [build-wheels]
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten dist directory
        run: |
          mkdir -p python/dist
          find dist-artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) | while read -r f; do
            cp "$f" python/dist/
          done
          ls -la python/dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          print-hash: true
          verbose: true
