name: Build Python wheels

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip cibuildwheel==2.*

      - name: Build wheels
        env:
          # Build CPython wheels only (no PyPy for now)
          CIBW_SKIP: "pp*"
          # Keep linux wheels portable (fixes WSL SIGILL from CET IBT/SHSTK)
          HARDENING_FLAGS: "-fcf-protection=none -mno-shstk"
          # manylinux images
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          # Dependencies needed to build libGigaVector.so inside the container
          CIBW_BEFORE_ALL_LINUX: "yum install -y libcurl-devel openssl-devel"
          # Reduce noise; repair with auditwheel to bundle non-glibc deps.
          CIBW_BUILD_VERBOSITY: "1"
        run: cibuildwheel --output-dir python/dist python

      - name: Build sdist (linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade build
          python -m build -s python -o python/dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: python/dist/*
          retention-days: 30

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten dist directory
        run: |
          mkdir -p python/dist
          find dist-artifacts -type f -name "*.whl" -o -name "*.tar.gz" | while read -r f; do
            cp "$f" python/dist/
          done
          ls -la python/dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          print-hash: true
          verbose: true

